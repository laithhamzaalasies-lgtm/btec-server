<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول | BTEC Hub Jordan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<section class="auth-card">
  <h1>BTEC Hub Jordan</h1>
  <p>سجّل دخولك للوصول إلى الموقع</p>

  <input id="email" type="email" placeholder="البريد الإلكتروني">
  <input id="password" type="password" placeholder="كلمة السر">

<div class="auth-buttons">
  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>
  <button onclick="resetPassword()" class="forgot-btn">نسيت كلمة السر؟</button>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
