<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="login-section">
  <div class="login-box">
    <h2>BTEC Hub Jordan</h2>
    <p>إنشاء حساب جديد</p>

    <input id="name" type="text" placeholder="اسمك الكامل">
    <input id="grade" type="text" placeholder="صفك (عاشر / أول ثانوي / توجيهي)">
    <input id="email" type="email" placeholder="الإيميل">
    <input id="password" type="password" placeholder="كلمة المرور">

    <button onclick="register()">إنشاء حساب</button>

    <p>عندك حساب؟ <a href="login.html">تسجيل الدخول</a></p>
  </div>
</section>

<script type="module" src="auth.js"></script>

</body>
</html>
